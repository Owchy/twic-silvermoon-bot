<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silvermoon — Raids</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar"></div>
  <div class="page-wrapper">
    <header id="topbar"></header>
    <main class="content">
      <div id="raid-list"><div class="text-muted">Loading…</div></div>
    </main>
  </div>

  <!-- Create Raid Modal -->
  <div class="modal-backdrop" id="create-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create Raid Event</h3>
        <button class="modal-close" onclick="closeModal('create-modal')">×</button>
      </div>
      <form id="create-form">
        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" placeholder='e.g. "Heroic Amirdrassil"' required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Difficulty</label>
            <select name="difficulty" required>
              <option value="Normal">Normal</option>
              <option value="Heroic" selected>Heroic</option>
              <option value="Mythic">Mythic</option>
              <option value="LFR">LFR</option>
            </select>
          </div>
          <div class="form-group">
            <label>Max Size</label>
            <input type="number" name="max_size" value="20" min="1" max="40">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required>
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" name="time" required>
          </div>
        </div>
        <div class="form-group">
          <label>Description (optional)</label>
          <textarea name="description" placeholder="Notes, strategy links, etc."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Raid</button>
        </div>
      </form>
    </div>
  </div>

  <!-- View Signups Modal -->
  <div class="modal-backdrop" id="signups-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="signups-modal-title">Raid Signups</h3>
        <button class="modal-close" onclick="closeModal('signups-modal')">×</button>
      </div>
      <div id="signups-modal-body"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let raids = [];

    initApp('Raids').then(async user => {
      if (!user) return;

      if (user.isOfficer) {
        document.getElementById('topbar-actions').innerHTML =
          `<button class="btn btn-primary" onclick="openModal('create-modal')">+ Create Raid</button>`;
      }

      await loadRaids();
    });

    async function loadRaids() {
      raids = await fetch('/api/raids').then(r => r.json());
      const el = document.getElementById('raid-list');

      if (!raids.length) {
        el.innerHTML = '<div class="empty-state"><p>No upcoming raids. Officers can create one above.</p></div>';
        return;
      }

      el.innerHTML = '<div class="raid-cards">' + raids.map(renderRaidCard).join('') + '</div>';
    }

    function renderRaidCard(r) {
      const isOfficer = currentUser?.isOfficer;
      const statusBadgeHtml = r.status !== 'open'
        ? `<span class="badge badge-${r.status === 'locked' ? 'benched' : 'declined'}">${r.status}</span>`
        : '';

      return `
        <div class="raid-card" id="raid-${r.id}">
          <div class="raid-card-header">
            <div>
              <div class="raid-card-title">${diffBadge(r.difficulty)} ${r.title} ${statusBadgeHtml}</div>
              <div class="raid-card-meta">📅 ${fmtDate(r.raid_date)} &nbsp;·&nbsp; Max ${r.max_size}</div>
            </div>
            <div class="raid-card-actions">
              <button class="btn btn-ghost btn-sm" onclick="viewSignups(${r.id})">👥 Signups</button>
              ${isOfficer ? `
                <button class="btn btn-ghost btn-sm" onclick="toggleLock(${r.id}, '${r.status}')">
                  ${r.status === 'locked' ? '🔓 Unlock' : '🔒 Lock'}
                </button>
                <button class="btn btn-danger btn-sm" onclick="deleteRaid(${r.id})">🗑️</button>
              ` : ''}
            </div>
          </div>
          <div class="raid-card-body">
            <div class="role-count"><strong>${r.counts.tanks}</strong>Tanks</div>
            <div class="role-count"><strong>${r.counts.healers}</strong>Healers</div>
            <div class="role-count"><strong>${r.counts.dps}</strong>DPS</div>
            <div class="role-count" style="margin-left:auto"><strong style="color:var(--accent)">${r.counts.total}</strong><span class="text-muted">/${r.max_size}</span></div>
          </div>
          ${r.description ? `<div style="margin-top:10px;font-size:13px;color:var(--text-muted)">${r.description}</div>` : ''}
          ${r.warcraftlogs ? `<div style="margin-top:8px;font-size:13px">📊 <a href="${r.warcraftlogs}" target="_blank">WarcraftLogs</a></div>` : ''}
        </div>`;
    }

    function viewSignups(id) {
      const raid = raids.find(r => r.id === id);
      if (!raid) return;
      document.getElementById('signups-modal-title').textContent = raid.title;

      const groups = {
        accepted: raid.signups.filter(s => s.status === 'accepted'),
        late:     raid.signups.filter(s => s.status === 'late'),
        tentative:raid.signups.filter(s => s.status === 'tentative'),
        declined: raid.signups.filter(s => s.status === 'declined'),
        benched:  raid.signups.filter(s => s.status === 'benched'),
        absent:   raid.signups.filter(s => s.status === 'absent'),
      };

      function roleSection(title, signups) {
        if (!signups.length) return '';
        return `<div class="signup-section">
          <h4>${title}</h4>
          <div class="signup-list">${signups.map(s => `
            <div class="signup-row">
              ${classEmoji(s.class)}
              <span class="char-name" style="color:${classColor(s.class)}">${s.character_name}</span>
              <span class="spec-name">— ${s.spec} ${s.class}</span>
            </div>`).join('')}
          </div>
        </div>`;
      }

      const tanks   = groups.accepted.filter(s => s.role === 'tank');
      const healers = groups.accepted.filter(s => s.role === 'healer');
      const dps     = groups.accepted.filter(s => s.role === 'dps');

      document.getElementById('signups-modal-body').innerHTML =
        roleSection('🛡️ Tanks', tanks) +
        roleSection('💚 Healers', healers) +
        roleSection('⚔️ DPS', dps) +
        roleSection('⏰ Late', groups.late) +
        roleSection('❓ Tentative', groups.tentative) +
        roleSection('🪑 Benched', groups.benched) +
        roleSection('🔴 Absent', groups.absent) +
        roleSection('❌ Declined', groups.declined) ||
        '<div class="empty-state"><p>No signups yet.</p></div>';

      openModal('signups-modal');
    }

    async function toggleLock(id, currentStatus) {
      await apiRequest('PATCH', `/api/raids/${id}`, { status: currentStatus === 'locked' ? 'open' : 'locked' });
      await loadRaids();
    }

    async function deleteRaid(id) {
      if (!confirm('Delete this raid event?')) return;
      await apiRequest('DELETE', `/api/raids/${id}`);
      showToast('Raid deleted.');
      await loadRaids();
    }

    document.getElementById('create-form').addEventListener('submit', async e => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      try {
        await apiRequest('POST', '/api/raids', data);
        closeModal('create-modal');
        e.target.reset();
        showToast('Raid created and posted to Discord!');
        await loadRaids();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
