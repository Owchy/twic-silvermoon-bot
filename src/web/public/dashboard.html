<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silvermoon — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="sidebar"></div>
  <div class="page-wrapper">
    <header id="topbar"></header>
    <main class="content">
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-label">Active Raiders</div><div class="stat-value" id="stat-raiders">—</div></div>
        <div class="stat-card"><div class="stat-label">Upcoming Raids</div><div class="stat-value" id="stat-raids">—</div></div>
        <div class="stat-card"><div class="stat-label">M+ Runs Logged</div><div class="stat-value" id="stat-mplus">—</div></div>
        <div class="stat-card"><div class="stat-label">Avg Attendance</div><div class="stat-value" id="stat-att">—</div></div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title">Upcoming Raids</div>
          <div id="upcoming-raids"><div class="text-muted">Loading…</div></div>
        </div>
        <div class="card">
          <div class="card-title">Recent M+ Runs</div>
          <div id="recent-runs"><div class="text-muted">Loading…</div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    initApp('Dashboard').then(async user => {
      if (!user) return;
      const stats = await fetch('/api/stats').then(r => r.json());

      document.getElementById('stat-raiders').textContent = stats.activeRaiders;
      document.getElementById('stat-raids').textContent   = stats.upcomingRaids;
      document.getElementById('stat-mplus').textContent   = stats.recentMplusRuns;
      document.getElementById('stat-att').textContent     = stats.avgAttendance + '%';

      // Upcoming raids
      const raidEl = document.getElementById('upcoming-raids');
      if (!stats.upcomingList?.length) {
        raidEl.innerHTML = '<div class="empty-state"><p>No upcoming raids.</p></div>';
      } else {
        raidEl.innerHTML = stats.upcomingList.map(r => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
            <div>
              <div style="font-weight:600">${diffBadge(r.difficulty)} ${r.title}</div>
              <div class="text-muted" style="font-size:12px;margin-top:3px">${fmtDate(r.date)}</div>
            </div>
            <div style="text-align:right;font-size:13px">
              <span style="color:var(--accent);font-weight:600">${r.confirmed}</span>
              <span class="text-muted">/${r.maxSize}</span>
            </div>
          </div>`).join('');
      }

      // Recent M+ runs
      const runsEl = document.getElementById('recent-runs');
      if (!stats.recentRuns?.length) {
        runsEl.innerHTML = '<div class="empty-state"><p>No runs logged yet.</p></div>';
      } else {
        runsEl.innerHTML = `<table><thead><tr><th>Key</th><th>Dungeon</th><th>Date</th></tr></thead><tbody>` +
          stats.recentRuns.map(r => `
            <tr>
              <td><span style="font-weight:700;color:${r.in_time ? 'var(--green)' : 'var(--red)'}">+${r.key_level}</span></td>
              <td>${r.dungeon}</td>
              <td class="text-muted">${fmtDateShort(r.completed_at)}</td>
            </tr>`).join('') +
          `</tbody></table>`;
      }
    });
  </script>
</body>
</html>
